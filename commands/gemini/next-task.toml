description = "Pick and work on the next task from TASKS.md"

prompt = """
Pick the highest-priority unblocked task from TASKS.md and work on it.

1. FIND THE QUEUE — Run this to discover all task files:
   git_root=$(git rev-parse --show-toplevel 2>/dev/null || echo ".")
   find "$git_root" -name "TASKS.md" -not -path "*/.git/*" -not -path "*/node_modules/*" | sort | head -20
   Read all discovered TASKS.md files.

2. PICK A TASK — First, check if you already claimed a task in a previous session — look for your (@agent-id) on any task line. If found, resume that task (skip to step 4). Otherwise, select the first unclaimed, unblocked task by priority (P0 > P1 > P2 > P3):
   - Skip tasks with (@agent-name) — claimed by another agent
   - Skip tasks where Blocked by references an ID still in any TASKS.md
   - Prefer tasks whose ID appears in other tasks' Blocked by (unblocking has highest impact)
   - If the task has Tags, check whether they match your capabilities
   If no tasks are available, tell the user.

3. CLAIM IT — Append your identity (e.g., @gemini, @gemini-2) to the task line:
   - [ ] The task description (@your-agent-id)
   In multi-agent setups, commit and push the claim immediately. Otherwise it commits with your work in step 5.

4. DO THE WORK — Read Details, Files, Acceptance metadata. Check AGENTS.md for the project's build, test, and lint commands. Make minimal, focused edits. Run verification after changes.

5. COMPLETE — Remove the entire task block (task line + metadata + sub-tasks) from TASKS.md. Commit:
   git add <changed-files> TASKS.md
   git commit -m "<conventional commit for the actual work>"
   git pull --rebase && git push

6. LOOP — Read TASKS.md again, pick the next task. Continue until empty or stopped.
"""
